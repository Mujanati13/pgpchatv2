<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PGP Key Gen Success Summary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex justify-center">
<!-- Mobile Screen Container -->
<div class="w-full max-w-[430px] min-h-screen flex flex-col relative overflow-x-hidden shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Top App Bar (iOS Style) -->
<header class="flex items-center justify-between px-4 pt-14 pb-3 sticky top-0 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md z-10 border-b border-black/5 dark:border-white/5">
<button aria-label="Go back" class="flex items-center justify-center size-10 -ml-2 text-primary hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="text-[17px] font-semibold tracking-tight absolute left-1/2 -translate-x-1/2">Key Generation</h1>
<div class="size-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Scrollable Area -->
<main class="flex-1 flex flex-col px-5 pb-8 overflow-y-auto">
<!-- Success Graphic -->
<div class="flex justify-center mt-12 mb-8">
<div class="relative flex items-center justify-center size-28 rounded-full bg-primary/10 dark:bg-primary/20">
<div class="absolute inset-0 rounded-full bg-primary/20 dark:bg-primary/10 animate-pulse"></div>
<span class="material-symbols-outlined text-[72px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Header Text -->
<div class="text-center mb-10">
<h2 class="text-3xl font-bold tracking-tight mb-3">Success!</h2>
<p class="text-[15px] text-slate-600 dark:text-slate-400 leading-relaxed px-2">
                    Your keys are now stored in the local encrypted database.
                </p>
</div>
<!-- Fingerprint Details Card -->
<div class="bg-white dark:bg-white/5 rounded-2xl p-5 mb-10 shadow-sm border border-black/5 dark:border-white/10 relative overflow-hidden group">
<div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
<div class="flex justify-between items-start mb-2">
<p class="text-xs font-semibold text-primary uppercase tracking-widest">PGP Fingerprint</p>
<button class="text-slate-400 hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">content_copy</span>
</button>
</div>
<p class="text-[14px] font-mono text-slate-800 dark:text-slate-200 break-all leading-relaxed tracking-wider">
                    0x1234 ABCD 5678 EF90 1234 ABCD 5678 EF90
                </p>
</div>
<!-- Spacer to push actions to bottom if screen is tall enough -->
<div class="flex-1"></div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 mt-auto">
<button class="w-full py-3.5 px-4 rounded-xl flex items-center justify-center gap-2.5 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/15 text-[16px] font-semibold transition-colors">
<span class="material-symbols-outlined text-[20px]">vpn_key</span>
                    Backup Private Key
                </button>
<button class="w-full py-3.5 px-4 rounded-xl flex items-center justify-center gap-2.5 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/15 text-[16px] font-semibold transition-colors">
<span class="material-symbols-outlined text-[20px]">share</span>
                    Share Public Key
                </button>
<button class="w-full py-4 px-4 rounded-xl flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-slate-900 text-[17px] font-bold transition-colors mt-2 shadow-[0_4px_14px_0_rgba(19,236,91,0.39)]">
                    Finish
                </button>
</div>
</main>
</div>
</body></html>
