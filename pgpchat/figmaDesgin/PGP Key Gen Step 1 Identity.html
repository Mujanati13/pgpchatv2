<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PGP Key Gen - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display antialiased min-h-screen flex flex-col selection:bg-primary/30">
<!-- Top App Bar -->
<header class="flex items-center justify-between p-4 pb-2 shrink-0">
<button class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-lg font-semibold tracking-tight flex-1 ml-2 text-slate-900 dark:text-slate-100">Generate PGP Key</h2>
</header>
<!-- Progress Indicator -->
<div class="px-4 py-3 shrink-0">
<div class="flex items-center justify-between mb-2">
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Identity Information</p>
<p class="text-xs font-semibold text-slate-500 dark:text-slate-500 uppercase tracking-wider">Step 1 of 3</p>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-300" style="width: 33.33%;"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-4 pt-6 pb-4 overflow-y-auto">
<div class="text-center mb-8">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4 text-primary">
<span class="material-symbols-outlined text-3xl">badge</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">Create Your Identity</h1>
<p class="text-base text-slate-600 dark:text-slate-400 leading-relaxed max-w-[320px] mx-auto">
                Enter the name and email to be associated with your new PGP key pair. This information will be visible to others when sharing your public key.
            </p>
</div>
<!-- Form Inputs -->
<div class="flex flex-col gap-5 max-w-md w-full mx-auto">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="display-name">
                    Display Name <span class="text-red-500 dark:text-red-400">*</span>
</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 rounded-xl py-3.5 pl-10 pr-4 text-base text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" id="display-name" placeholder="e.g. Alice Smith" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email-address">
                    Email Address <span class="text-slate-400 font-normal text-xs ml-1">(Optional)</span>
</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-white dark:bg-slate-900/50 border border-slate-300 dark:border-slate-800 rounded-xl py-3.5 pl-10 pr-4 text-base text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" id="email-address" placeholder="e.g. alice@example.com" type="email"/>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="p-4 pt-2 shrink-0 max-w-md w-full mx-auto mt-auto pb-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold text-base py-3.5 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group">
            Next Step
            <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</footer>
</body></html>
