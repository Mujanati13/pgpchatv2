<!DOCTYPE html>

<html class="dark">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

                            </div>
                        </div>

                            <div class="flex items-center gap-1 shrink-0 ml-2">
                                <p class="text-slate-500 dark:text-slate-400 text-xs font-medium">Oct 23</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-[16px] text-slate-400">lock</span>
                            <p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal truncate">
                                Encrypted message...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Floating Action Button -->
        <button
            class="fixed bottom-6 right-6 lg:right-auto lg:ml-[340px] size-14 bg-primary text-white rounded-full flex items-center justify-center shadow-lg hover:bg-primary/90 transition-transform active:scale-95 cursor-pointer z-20">
            <span class="material-symbols-outlined text-3xl">edit_square</span>
        </button>
    </div>
</body>

</html>
