<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Navigation Drawer - Secure Messenger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2530",
                        "surface-hover-light": "#e2e8f0",
                        "surface-hover-dark": "#233140",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<!-- Background to simulate main app view -->
<div class="absolute inset-0 z-0 bg-surface-light dark:bg-surface-dark flex items-center justify-center">
<span class="text-slate-400 dark:text-slate-500">Main App Content</span>
</div>
<!-- Navigation Drawer Overlay -->
<div class="relative flex h-screen w-full flex-col z-50">
<!-- Backdrop -->
<div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity duration-300"></div>
<!-- Drawer Panel -->
<div class="absolute left-0 top-0 flex h-full w-[85%] max-w-[320px] flex-col bg-surface-light dark:bg-surface-dark shadow-2xl transition-transform duration-300 transform translate-x-0">
<!-- User Profile Header -->
<div class="flex flex-col p-6 bg-primary/10 dark:bg-primary/5 border-b border-slate-200 dark:border-slate-800/50">
<div class="flex items-center justify-between mb-4">
<div class="size-16 rounded-full bg-primary flex items-center justify-center text-white text-2xl font-bold shadow-md ring-4 ring-primary/20">
<span class="material-symbols-outlined text-[32px] font-variation-settings-'FILL'-1">shield_person</span>
</div>
<button class="p-2 rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-surface-hover-dark transition-colors">
<span class="material-symbols-outlined">qr_code_scanner</span>
</button>
</div>
<div>
<h2 class="text-lg font-bold text-slate-900 dark:text-white leading-tight">Anonymous User</h2>
<div class="flex items-center gap-1.5 mt-1 text-sm text-slate-500 dark:text-slate-400 font-mono bg-slate-100 dark:bg-slate-800/50 rounded px-2 py-0.5 w-fit">
<span class="material-symbols-outlined text-[14px]">key</span>
<span>0x4F9C...A1B2</span>
</div>
</div>
</div>
<!-- Scrollable Menu -->
<div class="flex-1 overflow-y-auto py-3 px-3 custom-scrollbar">
<ul class="flex flex-col gap-1">
<!-- Menu Item: Manage PGP (Active) -->
<li>
<a class="flex h-14 items-center gap-4 rounded-xl px-4 bg-primary/10 text-primary dark:bg-primary/20 dark:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">vpn_key</span>
<span class="text-base font-medium flex-1 truncate">Manage PGP Keys</span>
</a>
</li>
<!-- Menu Item: Contacts -->
<li>
<a class="flex h-14 items-center gap-4 rounded-xl px-4 text-slate-700 hover:bg-surface-hover-light dark:text-slate-300 dark:hover:bg-surface-hover-dark transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] text-slate-500 group-hover:text-slate-700 dark:group-hover:text-slate-300">contacts</span>
<span class="text-base font-medium flex-1 truncate">Contacts</span>
<div class="flex items-center">
<!-- Simple Toggle visual representation -->
<div class="w-10 h-6 bg-primary rounded-full relative shadow-inner">
<div class="w-4 h-4 bg-white rounded-full absolute right-1 top-1 shadow-sm"></div>
</div>
</div>
</a>
</li>
<!-- Menu Item: Auto-delete -->
<li>
<a class="flex h-14 items-center gap-4 rounded-xl px-4 text-slate-700 hover:bg-surface-hover-light dark:text-slate-300 dark:hover:bg-surface-hover-dark transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] text-slate-500 group-hover:text-slate-700 dark:group-hover:text-slate-300">auto_delete</span>
<span class="text-base font-medium flex-1 truncate">Auto-delete Messages</span>
<span class="text-xs font-semibold px-2 py-1 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded-md">24h</span>
</a>
</li>
<!-- Menu Item: Devices -->
<li>
<a class="flex h-14 items-center gap-4 rounded-xl px-4 text-slate-700 hover:bg-surface-hover-light dark:text-slate-300 dark:hover:bg-surface-hover-dark transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] text-slate-500 group-hover:text-slate-700 dark:group-hover:text-slate-300">devices</span>
<span class="text-base font-medium flex-1 truncate">Device Management</span>
<span class="flex h-5 w-5 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-white">2</span>
</a>
</li>
<!-- Divider -->
<li class="my-2 border-t border-slate-200 dark:border-slate-800"></li>
<!-- Menu Item: Settings -->
<li>
<a class="flex h-14 items-center gap-4 rounded-xl px-4 text-slate-700 hover:bg-surface-hover-light dark:text-slate-300 dark:hover:bg-surface-hover-dark transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] text-slate-500 group-hover:text-slate-700 dark:group-hover:text-slate-300">settings</span>
<span class="text-base font-medium flex-1 truncate">Settings</span>
</a>
</li>
<!-- Menu Item: Terms -->
<li>
<a class="flex h-14 items-center gap-4 rounded-xl px-4 text-slate-700 hover:bg-surface-hover-light dark:text-slate-300 dark:hover:bg-surface-hover-dark transition-colors group" href="#">
<span class="material-symbols-outlined text-[24px] text-slate-500 group-hover:text-slate-700 dark:group-hover:text-slate-300">description</span>
<span class="text-base font-medium flex-1 truncate">Terms &amp; Conditions</span>
</a>
</li>
</ul>
</div>
<!-- Footer area -->
<div class="p-4 border-t border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-center gap-2 text-slate-400 dark:text-slate-500 text-xs font-medium">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span>End-to-end Encrypted v2.4.1</span>
</div>
</div>
</div>
</div>
</body></html>
